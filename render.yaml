services:
  - type: web
    runtime: node
    name: betexplorer-api
    buildCommand: npm ci && npm run build && npx playwright install --with-deps chromium
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: HEADLESS
        value: "true"
      - key: ENABLE_PLAYWRIGHT_FALLBACK
        value: "true"
